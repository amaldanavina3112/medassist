<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="16" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
  <!-- Pill shape -->
  <ellipse cx="24" cy="32" rx="12" ry="18" rx="12" fill="#f472b6" transform="rotate(-30 32 32) translate(-8 0)"/>
  <ellipse cx="40" cy="32" rx="12" ry="18" fill="#60a5fa" transform="rotate(-30 32 32) translate(8 0)"/>
  <!-- Dividing line -->
  <line x1="22" y1="22" x2="42" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
